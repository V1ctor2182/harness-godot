name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: godot-self-evolve-implementation-system
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: godot-self-evolve-implementation-system/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compile check
        run: |
          npx tsc --noEmit -p packages/shared/tsconfig.json
          npx tsc --noEmit -p apps/server/tsconfig.json

  # GUT tests will be added in Phase 2 when we have the godot-agent Docker image in GHCR
  # For now, just verify TypeScript compiles
