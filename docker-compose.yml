name: ludus

services:
  mongodb:
    image: mongo:7
    expose:
      - '27017'
    volumes:
      - ludus_mongodb_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - '127.0.0.1:3001:3001'
    environment:
      - PORT=3001
      - MONGODB_URI=mongodb://mongodb:27017/ludus
      - NODE_ENV=production
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - reload_trigger:/reload
    stop_grace_period: 30s
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "const http = require('http'); const r = http.get('http://localhost:3001/api/health', res => { process.exit(res.statusCode === 200 ? 0 : 1); }); r.on('error', () => process.exit(1));",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    ports:
      - '127.0.0.1:3000:3000'
    environment:
      # Browser hits Caddy on the pretty domain, which proxies /api/* to the server.
      # Override LUDUS_DOMAIN in .env to change the host.
      - NEXT_PUBLIC_API_URL=https://${LUDUS_DOMAIN:-victorz.ludus}/api
    depends_on:
      server:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '127.0.0.1:80:80'
      - '127.0.0.1:443:443'
    environment:
      - LUDUS_DOMAIN=${LUDUS_DOMAIN:-victorz.ludus}
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - server
      - dashboard

  reloader:
    build:
      context: docker/reloader
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - reload_trigger:/reload
      - .env:/env/.env:ro
    environment:
      - GH_TOKEN=${GH_TOKEN}
      - GITHUB_REPO_URL=${GITHUB_REPO_URL}
      - BASE_BRANCH=${BASE_BRANCH:-master}
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy

volumes:
  ludus_mongodb_data:
  reload_trigger:
  caddy_data:
  caddy_config:
