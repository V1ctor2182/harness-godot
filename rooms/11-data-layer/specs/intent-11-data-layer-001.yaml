spec_id: "intent-11-data-layer-001"
type: intent
state: active
intent:
  summary: "13 MongoDB collections supporting cycle execution, knowledge management, and project observability"
  detail: |
    MongoDB standalone database named "harness" with 13 collections:
    - Cycle: state machine for implementation cycles
    - Task: task lifecycle with auto-incremented TASK-{N} IDs
    - AgentRun: agent execution metadata per run
    - AgentEvent: full event stream with 30-day TTL
    - Job: polling-based job queue with approval gates
    - Room: knowledge rooms from dual-source seeding
    - Spec: typed specs (intent, constraint, decision, convention, contract, runbook, snapshot)
    - TestResult: structured test output with per-layer results
    - Screenshot: captured screenshots with AI analysis
    - KnowledgeFile: legacy knowledge entries (migrating to Room+Spec)
    - Control: singleton system control document (mode, spending cap, auto-approval)
    - Counter: auto-increment ID generation
    - Milestone: project milestone tracking

    Key design: no replica set, no change streams, polling-based job queue.
    Migrations run automatically at server startup.
constraints: []
