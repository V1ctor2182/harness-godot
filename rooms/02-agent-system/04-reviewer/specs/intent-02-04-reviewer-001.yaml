spec_id: "intent-02-04-reviewer-001"
type: intent
state: draft
intent:
  summary: "7-item checklist 评审 PR，输出 severity-graded verdict"
  detail: |
    评估 PR 代码质量、PRD 合规性、架构一致性。7-item checklist 评审：
    code quality, PRD compliance, architecture, testing, conventions, room specs, context feedback。
    输出 verdict（approved 或 changes-requested with severity-graded issues）。
    Issues 分 severity: critical, major, minor, suggestion。
    Reviewer verdict wins over Coder — Coder 不能 override。
    连续 2 次 reject 后 escalate to human。
