spec_id: "intent-02-07-container-001"
type: intent
state: active
intent:
  summary: "Docker container 9-step lifecycle — create, inject context, stream, collect, cleanup"
  detail: |
    9-step container lifecycle:
    PREPARE → CREATE → INJECT → ATTACH → START → STREAM → WAIT → COLLECT → CLEANUP.
    Memory: 4GB default / 8GB max, CPU: 1 core.
    Container label: harness=agent (legacy zombie-farm=agent also scanned
    during orphan recovery for backward compat).
    Entrypoint: clone project repo → project-specific setup → rate limit
    check → claude code launch.
    Orphan recovery on startup: scan Docker for labeled containers, match
    against AgentRun docs, remove stale containers, create retry jobs.
    TASK_BRANCH support for retests — checkout existing branch.
