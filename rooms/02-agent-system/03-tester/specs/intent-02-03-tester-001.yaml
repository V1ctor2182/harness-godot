spec_id: "intent-02-03-tester-001"
type: intent
state: active
intent:
  summary: "Runs project-defined test layers, reports structured results, retries up to 3x"
  detail: |
    Test layers are dynamic, defined by project.yaml.test_layers — not hardcoded
    L1/L2/L3/L4. Quick-fail principle: earlier layer failure skips subsequent layers.
    Outputs structured JSON with per-layer pass/fail counts, failure details, and
    performance metrics. Retries failing runs up to 3 times before reporting final
    failure. The tester agent is project-agnostic; all test commands, timeouts, and
    layer definitions come from project configuration.
