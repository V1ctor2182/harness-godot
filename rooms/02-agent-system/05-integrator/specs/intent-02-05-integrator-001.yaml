intent:
  summary: "按拓扑依赖顺序合并 approved PRs，dry-run conflict detection"
  detail: |
    按拓扑依赖顺序合并 approved PRs。Dry-run conflict detection、merge conflict resolution、
    regression test 验证。合并顺序按 blockedBy 拓扑排序。合并前 dry-run: git merge --no-commit --no-ff。
