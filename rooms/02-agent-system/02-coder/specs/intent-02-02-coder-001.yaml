intent:
  summary: "Implements task code per project conventions, runs project test suite, opens PR"
  detail: |
    Generic coder agent. Clones the project repo, creates a feature branch from
    BASE_BRANCH, implements the task according to conventions injected from
    project.yaml, writes tests using the project-defined test framework, and
    pushes a PR with a structured body (summary, decisions, files changed,
    context feedback). Language and framework details come from project.yaml
    injection at runtime — the coder prompt itself is project-agnostic.
