spec_id: "intent-05-testing-pipeline-001"
type: intent
state: active
intent:
  summary: "Dynamic test layer pipeline — layers defined by project.yaml, not hardcoded"
  detail: |
    Test layers come from project.yaml.test_layers, making the pipeline project-agnostic.
    TestResult model stores layer as a free string field, and the dashboard groups results
    dynamically by whatever layers the project defines. The tester agent runs whatever
    test command the project specifies per layer. Quick-fail ordering and retry logic
    are handled by the harness, not the project.
