spec_id: "intent-07-03-analytics-001"
type: intent
state: active
intent:
  summary: "Analytics folded into Home Bento — spending, tests, fail reasons, active cycle status"
  detail: |
    The standalone /analytics page is gone. All analytics are tiles on
    the Home Bento grid:
     - Spending tile: current vs cap, stacked color by usage ratio
     - Tests tile (active cycle): dynamic layer grouping from
       api.listTests, no L1-L4 enum
     - Fail reasons tile: top-5 agent run errors, grouped by first line
     - Recent Cycles tile: last 4 cycles with status + cost
     - Milestones tile: real sync state (done/total + active + next)
     - Assets tile: status stacked bar from api.listAssets
     - Events stream footer: live SSE tail shared across every tile
    Every tile exposes [Open ↗] (popup) and [⛶] (maximize) buttons using
    the PopupProvider + PopupPreview primitives.
constraints:
  - "No analytics page — tiles must live on Home"
  - "Test layer grouping must be dynamic (groupBy result.layer)"
indexing:
  type: intent
  priority: high
  layer: feature
  domain: "analytics"
  tags: [bento, home, spending, tests, fail-reasons, popup-preview]
