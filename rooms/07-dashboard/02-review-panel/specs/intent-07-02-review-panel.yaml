spec_id: "intent-07-02-review-panel-001"
type: intent
state: active
intent:
  summary: "Unified Inbox — all human-in-the-loop decisions in one mail-style view"
  detail: |
    The "review panel" concept has been generalized into a unified Inbox
    that aggregates every item waiting on a human:
     - job approvals (requiresApproval=true)
     - plan Q&A (Orchestrator questions)
     - plan review (approve / request changes)
     - PR gate (reviewVerdict pending for in-review tasks)
     - draft specs (Curator 0.50-0.74)
     - next-cycle decisions (all tasks failed)
    The page is a two-pane mail client: left list with type tabs +
    urgency highlighting + j/k keyboard nav; right detail pane with
    per-type forms (ApprovalForm, PlanQAForm, PlanReviewForm, PRGateForm,
    DraftSpecForm). A single resolve endpoint dispatches to existing
    Job/Spec/Task handlers — no new collection, just a view-model.
    Top-nav bell shows unread count via useInboxBadge, refreshing on
    SSE events (inbox:new / inbox:resolved / job:requires_approval).
constraints:
  - "Inbox items must be derived at query time from existing Job/Spec/Task — never stored in their own collection"
  - "resolve endpoint must delegate to the same handlers as /api/jobs/:id/approve|reject|answer to avoid duplicating approval logic"
