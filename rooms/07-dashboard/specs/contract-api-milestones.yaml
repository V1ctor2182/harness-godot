spec_id: "contract-07-dashboard-api-milestones-001"
type: contract
state: active
contract:
  summary: "/api/milestones — yaml-synced roadmap endpoints"
  detail: |
    Endpoints:

    GET /api/milestones                 → MilestoneItem[], sorted by order
    GET /api/milestones/:id             → MilestoneDetail (+ cyclesDetail + specs)
    POST /api/milestones/sync           → { upserted, source }
                                           broadcasts milestone:updated

    Shape:
      MilestoneItem = {
        _id: string,              // "M8"
        name, description,
        goals: string[], features: string[], dependsOn: string[],
        estimatedWeeks: number, order: number,
        status: 'planned'|'active'|'completed'|'blocked',
        cycles: number[],
        startedAt?, completedAt?,
        totalCostUsd: number,
        lastSyncedAt: Date,
      }

      MilestoneDetail = MilestoneItem & {
        cyclesDetail: CycleLite[],
        specs: { _id, title, type, state }[],
      }
constraints:
  - "Static fields (name/description/goals/features/dependsOn/estimatedWeeks/order) are yaml-owned — runtime writes MUST NOT touch them"
  - "Runtime fields (status/cycles/totalCostUsd) are server-owned — yaml MUST NOT set them"
