spec_id: "intent-07-dashboard-001"
type: intent
state: active
intent:
  summary: "Observability dashboard for the harness team — Bento home, Cycle Team pipeline, unified Inbox, dynamic Milestones/Assets"
  detail: |
    Next.js dashboard focused on observing the AI engineering team. Core
    principles:
     - Cycle is the center of gravity — agents, tasks, tests collapse into
       a per-cycle Team View.
     - Harness vs Product layers strictly separated: no hardcoded game
       milestones, asset lists, or test layer enums in dashboard source.
       Milestones sync from yaml, assets scan from a filesystem, test
       layer grouping is runtime-derived.
     - 5 main nav items + 2 tool icons (Inbox bell, Settings gear) instead
       of the old 12-page navigation.
     - Home is a 12-column Bento grid of live tiles with a popup-preview /
       maximize-to-route interaction pattern.
     - Inbox unifies all human-in-the-loop decisions as a single
       view-model aggregated over Job/Spec/Task — no dedicated
       /jobs, /review, /drafts pages.
    See basic-doc/techdesign/06-dashboard.md for the full design.
constraints:
  - "No product-specific enums (L1-L4, M0-M15, 'zombie', etc.) in dashboard source"
  - "All pages must stay functional when backend features are partially available"
