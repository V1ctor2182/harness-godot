spec_id: "decision-07-dashboard-bento-popup-001"
type: decision
state: active
decision:
  summary: "Home is a 12-column Bento grid with popup-preview + maximize drill-down"
  detail: |
    Design decision for Home page layout:
     - 12-column CSS Grid, auto-rows-[120px], responsive breakpoints
     - Each bento tile is a self-contained <BentoTile> with span + title
       + optional [Open ↗] (popup) and [⛶] (maximize) buttons
     - Popup is a centered Radix Dialog (min(90vw, 1200px) × min(85vh, 800px))
       with lazy-loaded preview body — smaller scope than full page
     - Keyboard: ESC closes, F or ⌘↑ maximizes to the underlying route
     - Popup state lives in a global PopupProvider (React context),
       accessible from any component via usePopup()
     - At most 1 popup open at a time; clicking a new bento replaces it
  rationale: |
    The old dashboard had 12 separate top-level pages. Users couldn't
    see the team's state at a glance. Bento gives one-screen overview
    with graceful drill-down that preserves context (popup) or commits
    to focused work (maximize).
