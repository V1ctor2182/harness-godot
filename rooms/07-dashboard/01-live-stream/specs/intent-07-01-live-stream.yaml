spec_id: "intent-07-01-live-stream-001"
type: intent
state: active
intent:
  summary: "SSE-driven real-time observation: Cycle Team pipeline, per-agent drawers, live events log"
  detail: |
    Live observation surface for the harness team:
     - Team Pipeline (Cycle detail page) shows 6 role slots grouping
       agent runs. Multi-instance roles (coder/tester/reviewer/integrator)
       stack with a ×N badge and cumulative cost/duration. Single-instance
       roles (orchestrator/curator) show a single card.
     - Running cards pulse; failed cards border red; arrows between slots
       color by upstream activity.
     - Clicking a card opens an Agent drawer (Sheet primitive) driven by
       ?agent=<role> query param. Inside the drawer the reused
       AgentDetail component streams NDJSON via useAgentSSE with
       exponential backoff reconnect.
     - The global SSE hook (useGlobalSSE) is the single event bus;
       its event type list was extended with inbox:new / inbox:resolved /
       milestone:updated for Phase 2+3.
     - Events Log footer on Cycle page keeps the last 400 events as a
       collapsible tail.
constraints:
  - "Do not hardcode agent roles outside ROLE_ORDER in cycle page"
  - "AgentDetail component must not read URL params — always take id via props"
indexing:
