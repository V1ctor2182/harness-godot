intent:
  summary: "Generic AI engineering team — cross-module conventions, .harness/ contract, project-agnostic constraints"
  detail: |
    Reusable 6-agent framework (Orchestrator, Coder, Tester, Reviewer, Integrator, Curator)
    that implements software autonomously against any project repo. TypeScript strict mode,
    npm workspaces (apps/server Express API, apps/dashboard Next.js UI, packages/shared
    types and constants). MongoDB "harness" database for all persistence. Agent prompts in
    agents/ directory receive project context injection at runtime. The .harness/project.yaml
    contract defines project-specific settings (engine, language, conventions, test layers)
    so the harness itself stays project-agnostic.
